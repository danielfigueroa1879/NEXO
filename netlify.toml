[build]
  publish = "."
  functions = "netlify/functions"

# ===== TAREA PROGRAMADA =====
# Avisos por correo de documentos por vencer.
# Se ejecuta todos los días a las 12:00 UTC (~09:00 Chile CLT).
# Requiere env vars en Netlify → Site settings → Environment variables:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, RESEND_API_KEY, RESEND_FROM
[functions."notificar-vencimientos"]
  schedule = "0 12 * * *"

# ===== SIEMPRE FRESCO PERO RÁPIDO =====
# 'no-cache' obliga a revalidar con el servidor en cada visita (nunca sirve una
# versión vieja), pero permite responder 304 y NO volver a descargar el archivo
# si no cambió → carga mucho más rápida y fluida que 'no-store'.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# HTML: siempre fresco (revalidado)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate, proxy-revalidate"

# JS / CSS: se pueden cachear revalidando (304 si no cambian)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Imágenes: cache 1 día con revalidación (cargan al instante en visitas repetidas)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Íconos / favicon: nunca cambian → cache 1 año inmutable (Lighthouse-friendly)
[[headers]]
  for = "/favicon/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes de assets estáticos (logo, previews demo): 30 días revalidados
[[headers]]
  for = "/images/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
  for = "/images/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
  for = "/images/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
  for = "/images/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

# Service worker (sw.js): siempre fresco para publicar updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Web app manifest
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=604800"
